<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/componentes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Files.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='Logo/logodeNetDrop.png') }}" type="image/x-icon">
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <title>NetDrop</title>
</head>
<body>


    <nav role="navigation">
  <div id="menuToggle">
    <input type="checkbox" />
    <span></span>
    <span></span>
    <span></span>
    <ul id="menu">
      
      <a href="/"><li>Inicio</li></a>
      <a href="/update"><li>Subir</li></a>
      <a href="/qrgenerator"><li>Qr</li></a>
    </ul>
  </div>
</nav>


    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Modal de Descarga -->
    <div id="downloadModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeDownloadModal()">&times;</span>
            <div id="modalBody">
                <h2 id="modalTitle"></h2>
                <p id="modalMessage"></p>
                <div id="modalButtons" style="display: flex; gap: 10px; justify-content: space-between;">
                    <button onclick="closeDownloadModal()" class="modal-btn modal-btn-secondary">Denegar</button>
                    <button onclick="closeDownloadModal()" class="modal-btn" id="primaryBtn">Aceptar</button>
                </div>
            </div>
        </div>
    </div>


    <script src="{{ url_for('static', filename='js/scroll.js') }}"></script>
</body>
</html>
